name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            squashfs-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Set version from git tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Overriding version to $VERSION from tag ${{ github.ref_name }}"

            # tauri.conf.json — controls bundle filenames (ClassDeck_{version}_amd64.AppImage)
            jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
            mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

            # package.json — metadata consistency
            npm version "$VERSION" --no-git-tag-version --allow-same-version 2>/dev/null || true

            # Cargo.toml — crate version
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          else
            echo "version=$(jq -r '.version' src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Tauri
        run: npm run tauri build

      - name: Install appimagetool (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Patch AppImage (Linux only)
        if: runner.os == 'Linux'
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            echo "Patching $APPIMAGE ..."
            # appimagetool is itself an AppImage; extract-and-run bypasses FUSE
            APPIMAGE_EXTRACT_AND_RUN=1 bash scripts/patch-appimage-apprun.sh "$APPIMAGE"
          else
            echo "No AppImage found to patch."
          fi
        env:
          NO_STRIP: "true"

      - name: Set release tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and upload artifacts
        if: steps.vars.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          fail_on_unmatched_files: false
